version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: tunga-db
    environment:
      POSTGRES_USER: tunga
      POSTGRES_PASSWORD: tunga_password
      POSTGRES_DB: tunga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tunga-pay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunga -d tunga_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tunga-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://tunga:tunga_password@db:5432/tunga_db
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tunga-pay-network
    restart: unless-stopped

  # Development service
  tunga-pay-dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: tunga-pay-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - tunga-pay-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Production service
  tunga-pay-prod:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    container_name: tunga-pay-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    networks:
      - tunga-pay-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  tunga-pay-network:
    driver: bridge

volumes:
  postgres_data:
