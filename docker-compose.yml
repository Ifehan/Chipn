version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: chipn-db
    environment:
      POSTGRES_USER: chipn
      POSTGRES_PASSWORD: chipn_password
      POSTGRES_DB: chipn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chipn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chipn -d chipn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chipn-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chipn:chipn_password@db:5432/chipn_db
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chipn-network
    restart: unless-stopped

  # Development service
  chipn-dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: chipn-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - chipn-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Production service
  chipn-prod:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    container_name: chipn-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    networks:
      - chipn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  chipn-network:
    driver: bridge

volumes:
  postgres_data:
