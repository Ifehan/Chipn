# H-3: DB port NOT exposed to host — only accessible within the internal network
# H-4: Use environment variables / secrets for DB credentials in production, not hardcoded values
# L-3: 'version' key removed (deprecated in modern Docker Compose)

services:
  db:
    image: postgres:16-alpine
    container_name: chipn-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chipn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-chipn_db}
    # H-3: No ports: block — DB is NOT accessible from outside Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chipn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chipn} -d ${POSTGRES_DB:-chipn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chipn-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chipn}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chipn_db}
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chipn-network
    restart: unless-stopped

  chipn-dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: chipn-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - chipn-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  chipn-prod:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    container_name: chipn-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    networks:
      - chipn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  chipn-network:
    driver: bridge

volumes:
  postgres_data:
