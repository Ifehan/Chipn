name: PR Tests with Coverage

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Run unit tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: unit-tests-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Post coverage summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage/coverage-summary.json')) return;

            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;
            const threshold = 80;
            const pass = (pct) => pct >= threshold ? '✅ Pass' : '❌ Fail';
            const allPass = ['lines','statements','functions','branches']
              .every(k => total[k].pct >= threshold);

            const body = `## Unit Test Coverage Report

            | Metric | Coverage | Required | Status |
            |--------|----------|----------|--------|
            | Lines | ${total.lines.pct}% | ${threshold}% | ${pass(total.lines.pct)} |
            | Statements | ${total.statements.pct}% | ${threshold}% | ${pass(total.statements.pct)} |
            | Functions | ${total.functions.pct}% | ${threshold}% | ${pass(total.functions.pct)} |
            | Branches | ${total.branches.pct}% | ${threshold}% | ${pass(total.branches.pct)} |

            ${allPass ? '✅ **Coverage threshold met! Ready to merge.**' : '❌ **Coverage below 80% threshold. Please add more tests before merging.**'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: Run E2E tests
        run: pnpm run test:e2e:chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 30

      - name: Post E2E results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## E2E Test Results\n\n';

            if (fs.existsSync('playwright-report/results.json')) {
              const results = JSON.parse(fs.readFileSync('playwright-report/results.json', 'utf8'));
              const stats = results.stats || {};
              const passed = stats.expected || 0;
              const failed = stats.unexpected || 0;
              const flaky = stats.flaky || 0;
              const skipped = stats.skipped || 0;
              const total = passed + failed + flaky + skipped;

              body += `| Status | Count |\n|--------|-------|\n`;
              body += `| Passed | ${passed} |\n`;
              body += `| Failed | ${failed} |\n`;
              body += `| Flaky | ${flaky} |\n`;
              body += `| Skipped | ${skipped} |\n`;
              body += `| **Total** | **${total}** |\n\n`;
              body += failed === 0 ? '✅ **All E2E tests passed!**\n' : '❌ **Some E2E tests failed.**\n';
            } else {
              body += '⚠️ Could not find E2E test results.\n';
            }

            body += `\n[View Playwright report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  coverage-gate:
    name: Coverage Gate (80% Required)
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Verify coverage threshold
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('coverage/coverage-summary.json')) {
              console.error('Coverage summary not found');
              process.exit(1);
            }
            const { total } = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const threshold = 80;
            const metrics = ['lines','statements','functions','branches'];

            metrics.forEach(m => console.log(m + ': ' + total[m].pct + '%'));

            const passing = metrics.every(m => total[m].pct >= threshold);
            if (passing) {
              console.log('Coverage threshold of ' + threshold + '% met.');
            } else {
              console.error('Coverage below ' + threshold + '% threshold.');
              process.exit(1);
            }
          "
